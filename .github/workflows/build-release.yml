name: Build and Release APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APKs
        run: ./gradlew assembleRelease

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts || echo "1.0.0")
          VERSION_CODE=$(grep -oP 'versionCode = \K[0-9]+' app/build.gradle.kts || echo "1")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Sign APKs
        uses: r0adkll/sign-android-release@v1
        id: sign_apks
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
        continue-on-error: true

      - name: Prepare release APKs
        run: |
          mkdir -p release-apks
          VERSION="${{ steps.version.outputs.version }}"
          
          if [ "${{ steps.sign_apks.outcome }}" == "success" ]; then
            for apk in ${{ steps.sign_apks.outputs.signedReleaseFile }}; do
              if [[ "$apk" == *"universal"* ]]; then
                cp "$apk" "release-apks/HayaGuard-${VERSION}-universal.apk"
              elif [[ "$apk" == *"arm64-v8a"* ]]; then
                cp "$apk" "release-apks/HayaGuard-${VERSION}-arm64-v8a.apk"
              elif [[ "$apk" == *"armeabi-v7a"* ]]; then
                cp "$apk" "release-apks/HayaGuard-${VERSION}-armeabi-v7a.apk"
              elif [[ "$apk" == *"x86_64"* ]]; then
                cp "$apk" "release-apks/HayaGuard-${VERSION}-x86_64.apk"
              elif [[ "$apk" == *"x86"* ]]; then
                cp "$apk" "release-apks/HayaGuard-${VERSION}-x86.apk"
              fi
            done
          else
            for apk in app/build/outputs/apk/release/*.apk; do
              filename=$(basename "$apk")
              if [[ "$filename" == *"universal"* ]]; then
                cp "$apk" "release-apks/HayaGuard-${VERSION}-universal.apk"
              elif [[ "$filename" == *"arm64-v8a"* ]]; then
                cp "$apk" "release-apks/HayaGuard-${VERSION}-arm64-v8a.apk"
              elif [[ "$filename" == *"armeabi-v7a"* ]]; then
                cp "$apk" "release-apks/HayaGuard-${VERSION}-armeabi-v7a.apk"
              elif [[ "$filename" == *"x86_64"* ]]; then
                cp "$apk" "release-apks/HayaGuard-${VERSION}-x86_64.apk"
              elif [[ "$filename" == *"x86"* ]] && [[ "$filename" != *"x86_64"* ]]; then
                cp "$apk" "release-apks/HayaGuard-${VERSION}-x86.apk"
              fi
            done
          fi
          
          ls -la release-apks/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HayaGuard-APKs-${{ steps.version.outputs.version }}
          path: release-apks/*.apk
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: release-apks/*.apk
          generate_release_notes: true
          body: |
            ## HayaGuard ${{ steps.version.outputs.version }}
            
            ### Download
            - **Universal APK**: Works on all devices (larger size)
            - **arm64-v8a**: For modern 64-bit ARM devices (recommended for most phones)
            - **armeabi-v7a**: For older 32-bit ARM devices
            - **x86_64**: For 64-bit x86 devices (emulators, some tablets)
            - **x86**: For 32-bit x86 devices
            
            ### Installation
            1. Download the APK matching your device architecture
            2. Enable "Install from unknown sources" if prompted
            3. Install and enjoy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Latest Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build (${{ steps.version.outputs.version }})
          prerelease: true
          files: release-apks/*.apk
          body: |
            ## Automated Build
            
            Build Date: ${{ steps.version.outputs.date }}
            Version: ${{ steps.version.outputs.version }}
            
            ### Download
            - **Universal APK**: Works on all devices
            - **arm64-v8a**: For modern 64-bit ARM devices
            - **armeabi-v7a**: For older 32-bit ARM devices
            - **x86_64**: For 64-bit x86 devices
            - **x86**: For 32-bit x86 devices
            
            This is an automated pre-release build from the main branch.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
